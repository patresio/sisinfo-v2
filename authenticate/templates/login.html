{% load static %}
{% load ui_tags %}

<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% include "include/_css.html" %}
  <title>Login - SISInfo</title>
</head>

<body class="flex justify-center items-center h-screen bg-ctp-base text-ctp-text">

  <div class="{% login_container %} w-full max-w-md bg-ctp-surface0 p-8 rounded-2xl shadow-lg border border-ctp-surface1">
    <form class="space-y-6" action="" method="post">{% csrf_token %}
      {{ form.non_field_errors }}
      <div class="flex flex-col justify-center items-center gap-4 mb-6">
        <img src="{% static 'img/logo/logo.png' %}" alt="Logo" class="h-20 w-auto object-contain">
        <h5 class="text-2xl font-bold text-ctp-text">SISInfo</h5>
      </div>

      <div class="relative">
        {{form.username.errors}}
        <label for="{{form.username.id_for_label}}" class="block mb-2 text-sm font-medium text-ctp-text">Usuário</label>
        <input type="text" name="username" class="bg-ctp-surface0 border border-ctp-surface1 text-ctp-text text-sm rounded-lg focus:ring-ctp-blue focus:border-ctp-blue block w-full p-2.5 placeholder-ctp-overlay0" placeholder="Seu usuário" required="" id="id_username">
      </div>

      <div class="relative">
        {{form.password.errors}}
        <label for="{{form.password.id_for_label}}" class="block mb-2 text-sm font-medium text-ctp-text">Senha</label>
        <input type="password" name="password" class="bg-ctp-surface0 border border-ctp-surface1 text-ctp-text text-sm rounded-lg focus:ring-ctp-blue focus:border-ctp-blue block w-full p-2.5 placeholder-ctp-overlay0" placeholder="••••••••" required="" id="id_password">
      </div>

      {% include "include/_alert.html" %}

      <div class="flex items-center justify-between">
        <a href="{% url 'authenticate:password_reset' %}" class="text-sm text-ctp-blue hover:underline">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="w-full text-ctp-crust bg-ctp-blue hover:bg-ctp-sapphire focus:ring-4 focus:outline-none focus:ring-ctp-sky font-medium rounded-lg text-sm px-5 py-2.5 text-center flex justify-center items-center gap-2 transition-colors">
        Entrar
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
      </button>
    </form>
  </div>

  {% include "include/_js.html" %}
</body>
</html>
