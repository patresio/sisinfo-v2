{% extends "_base.html" %}
{% block title %}
    {{ material.name }}
{% endblock title %}
{% block content %}
    <section id="{{ material.slug }}">
        <div>
            <h1>{{ material.name }}</h1>
        </div>
        {% for report in reports %}
        <div>
            <a href="{{ report.report.get_absolute_url }}">{{report.report}}</a>
        </div>
        {% endfor %}
    </section>
{% endblock content %}
