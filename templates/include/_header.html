{% load static %}

<header class="flex items-center justify-between px-6 py-4 bg-ctp-mantle border-b border-ctp-crust shadow-sm z-30">
    <div class="flex items-center">
        <!-- Mobile Sidebar Toggle -->
        <button data-drawer-target="logo-sidebar" data-drawer-toggle="logo-sidebar" aria-controls="logo-sidebar" type="button" class="inline-flex items-center p-2 text-sm text-ctp-subtext0 rounded-lg md:hidden hover:bg-ctp-surface0 focus:outline-none focus:ring-2 focus:ring-ctp-surface1">
            <span class="sr-only">Open sidebar</span>
            <svg class="w-6 h-6" aria-hidden="true" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
               <path clip-rule="evenodd" fill-rule="evenodd" d="M2 4.75A.75.75 0 012.75 4h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 4.75zm0 10.5a.75.75 0 01.75-.75h7.5a.75.75 0 010 1.5h-7.5a.75.75 0 01-.75-.75zM2 10a.75.75 0 01.75-.75h14.5a.75.75 0 010 1.5H2.75A.75.75 0 012 10z"></path>
            </svg>
         </button>

        <!-- Global Search -->
        <div class="relative hidden md:block w-96 ml-4">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-4 h-4 text-ctp-overlay0" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                </svg>
            </div>
            <input type="text" id="global-search-input" class="block w-full p-2 pl-10 text-sm text-ctp-text border border-ctp-surface0 rounded-lg bg-ctp-surface0 focus:ring-ctp-blue focus:border-ctp-blue placeholder-ctp-overlay0" placeholder="Pesquisar (Fornecedores, Licitações...)" autocomplete="off">
            <!-- Search Results Dropdown -->
            <div id="global-search-results" class="hidden absolute z-50 w-full mt-1 bg-ctp-surface0 rounded-lg shadow-lg border border-ctp-surface1 max-h-96 overflow-y-auto">
                <!-- Results will be injected here via JS -->
            </div>
        </div>
    </div>

    <div class="flex items-center gap-3">
        <!-- Theme Toggle -->
        <button id="theme-toggle" type="button" class="text-ctp-text hover:bg-ctp-surface1 focus:outline-none focus:ring-4 focus:ring-ctp-surface1 rounded-lg text-sm p-2.5">
            <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 100 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
        </button>

        <!-- User Profile -->
        <div class="relative">
            <button type="button" class="flex text-sm bg-ctp-surface0 rounded-full focus:ring-4 focus:ring-ctp-surface1" aria-expanded="false" data-dropdown-toggle="dropdown-user">
                <span class="sr-only">Open user menu</span>
                <img class="w-8 h-8 rounded-full" src="{% static 'img/profile-empty.png' %}" alt="user photo">
            </button>
            <div class="z-50 hidden absolute right-0 top-8 my-4 text-base list-none bg-ctp-mantle divide-y divide-ctp-surface0 rounded shadow-lg border border-ctp-surface0 min-w-[200px]" id="dropdown-user">
                <div class="px-4 py-3" role="none">
                    <p class="text-sm text-ctp-text" role="none">
                        {{request.user.fullname}}
                    </p>
                    <p class="text-sm font-medium text-ctp-subtext0 truncate" role="none">
                        {{request.user.email}}
                    </p>
                </div>
                <ul class="py-1" role="none">
                    <li>
                        <a href="{% url 'authenticate:profile' %}" class="block px-4 py-2 text-sm text-ctp-text hover:bg-ctp-surface0" role="menuitem">Perfil</a>
                    </li>
                    <li>
                        <a href="{% url 'authenticate:change_password' %}" class="block px-4 py-2 text-sm text-ctp-text hover:bg-ctp-surface0" role="menuitem">Trocar senha</a>
                    </li>
                    <li>
                        <a href="{% url 'authenticate:logout' %}" class="block px-4 py-2 text-sm text-ctp-text hover:bg-ctp-surface0" role="menuitem">Sair</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</header>
