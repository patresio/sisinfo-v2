<!-- CDN JQUERY -->
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

<!-- Custom JS for Sidebar/Dropdowns/Theme/Search -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // --- Sidebar toggle ---
    const sidebar = document.getElementById('logo-sidebar');
    const toggleButton = document.querySelector('[data-drawer-toggle="logo-sidebar"]');

    if (toggleButton && sidebar) {
        toggleButton.addEventListener('click', function() {
            sidebar.classList.toggle('-translate-x-full');
        });
    }

    // --- Dropdown toggle ---
    const dropdownToggles = document.querySelectorAll('[data-dropdown-toggle]');
    dropdownToggles.forEach(toggle => {
        toggle.addEventListener('click', function(e) {
            const targetId = this.getAttribute('data-dropdown-toggle');
            const target = document.getElementById(targetId);
            if (target) {
                target.classList.toggle('hidden');
            }
            e.stopPropagation();
        });
    });

    // --- Collapse toggle (sidebar submenus) ---
    const collapseToggles = document.querySelectorAll('[data-collapse-toggle]');
    collapseToggles.forEach(toggle => {
        toggle.addEventListener('click', function() {
            const targetId = this.getAttribute('data-collapse-toggle');
            const target = document.getElementById(targetId);
            if (target) {
                target.classList.toggle('hidden');
            }
        });
    });

    // --- Close dropdowns when clicking outside ---
    document.addEventListener('click', function(e) {
        document.querySelectorAll('[id^="dropdown-"]').forEach(dropdown => {
            if (!dropdown.classList.contains('hidden') && !e.target.closest(`[data-dropdown-toggle="${dropdown.id}"]`) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
            }
        });
    });

    // --- Theme Toggle ---
    var themeToggleBtn = document.getElementById('theme-toggle');
    var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
    var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

    // Change the icons inside the button based on previous settings
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        themeToggleLightIcon.classList.remove('hidden');
    } else {
        themeToggleDarkIcon.classList.remove('hidden');
    }

    if (themeToggleBtn) {
        themeToggleBtn.addEventListener('click', function() {
            // toggle icons
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            // if set via local storage previously
            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            } else {
                // if NOT set via local storage previously
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    }

    // --- Global Search AJAX ---
    const searchInput = document.getElementById('global-search-input');
    const searchResults = document.getElementById('global-search-results');
    let searchTimeout = null;

    if (searchInput) {
        searchInput.addEventListener('keyup', function(e) {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();

            if (query.length < 2) {
                searchResults.classList.add('hidden');
                searchResults.innerHTML = '';
                return;
            }

            searchTimeout = setTimeout(() => {
                fetch(`/api/search/?q=${encodeURIComponent(query)}`)
                    .then(response => response.json())
                    .then(data => {
                        searchResults.innerHTML = '';
                        if (data.results && data.results.length > 0) {
                            data.results.forEach(item => {
                                const div = document.createElement('div');
                                div.className = 'p-2 hover:bg-ctp-surface1 cursor-pointer border-b border-ctp-surface1 last:border-0';

                                const link = document.createElement('a');
                                link.href = item.url;
                                link.className = 'block';

                                const titleP = document.createElement('p');
                                titleP.className = 'text-sm font-semibold text-ctp-text';
                                titleP.textContent = item.title;

                                const typeP = document.createElement('p');
                                typeP.className = 'text-xs text-ctp-subtext0';
                                typeP.textContent = item.type;

                                link.appendChild(titleP);
                                link.appendChild(typeP);
                                div.appendChild(link);

                                searchResults.appendChild(div);
                            });
                            searchResults.classList.remove('hidden');
                        } else {
                            searchResults.innerHTML = '<div class="p-2 text-sm text-ctp-subtext0">Nenhum resultado encontrado.</div>';
                            searchResults.classList.remove('hidden');
                        }
                    })
                    .catch(error => {
                        console.error('Error fetching search results:', error);
                    });
            }, 300); // Debounce 300ms
        });

        // Close search results on click outside
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.add('hidden');
            }
        });
    }
});
</script>
